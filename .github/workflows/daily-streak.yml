name: 🔥 Daily Streak Counter

on:
  schedule:
    - cron: '15 1 * * *'   # 6:45 AM IST
    - cron: '45 6 * * *'   # 12:15 PM IST
    - cron: '20 10 * * *'  # 3:50 PM IST
    - cron: '50 15 * * *'  # 9:20 PM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-streak:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write update script
        run: |
          cat > /tmp/update.py << 'EOF'
          import json
          from datetime import datetime, timezone
          now = datetime.now(timezone.utc)
          try:
              with open('stats.json', 'r') as f:
                  data = json.load(f)
          except FileNotFoundError:
              data = {'total_commits': 0, 'started': now.strftime('%Y-%m-%d')}
          data['total_commits'] = data.get('total_commits', 0) + 1
          data['last_commit'] = now.strftime('%Y-%m-%d %H:%M:%S UTC')
          with open('stats.json', 'w') as f:
              json.dump(data, f, indent=2)
          with open('activity.log', 'a') as f:
              f.write(f"{now.strftime('%Y-%m-%d %H:%M:%S')} UTC — commit #{data['total_commits']}\n")

          today = now.strftime('%Y-%m-%d')
          try:
              with open('streak.json', 'r') as f:
                  streak_data = json.load(f)
          except FileNotFoundError:
              streak_data = {'streak': 0, 'started': today, 'last_updated': None}

          if streak_data.get('last_updated') != today:
              from datetime import date
              last = streak_data.get('last_updated')
              if last:
                  gap = (date.fromisoformat(today) - date.fromisoformat(last)).days
              else:
                  gap = 1
              streak_data['streak'] = streak_data.get('streak', 0) + 1 if gap == 1 else 1
              if gap != 1:
                  streak_data['started'] = today
              streak_data['last_updated'] = today
              with open('streak.json', 'w') as f:
                  json.dump(streak_data, f, indent=2)

              lines = [
                  "# Daily Streak Tracker",
                  "",
                  "| Stat | Value |",
                  "|------|-------|",
                  f"| Streak | **{streak_data['streak']} days** |",
                  f"| Today | {today} |",
                  f"| Started | {streak_data['started']} |",
                  "",
                  "> Auto-committed daily via GitHub Actions.",
                  "> No server. No deployment. Just consistency.",
                  "",
              ]
              with open('README.md', 'w') as f:
                  f.write("\n".join(lines))
          EOF

      - name: Make random commits
        run: |
          git config user.email "177908686+Learnee-debug@users.noreply.github.com"
          git config user.name "Learnee-debug"

          # Random number of commits: 9 to 10 per session (4 sessions/day = ~36-40/day)
          NUM=$(python3 -c "import random; print(random.randint(9, 10))")
          echo "🎲 Making $NUM commits this session..."

          MSGS=(
            "⚡ daily grind"
            "🔥 stay consistent"
            "💡 learning daily"
            "🚀 building daily"
            "🧠 stacking habits"
            "📈 small progress"
            "💪 day by day"
            "🎯 staying focused"
            "✨ building momentum"
            "🌱 growing daily"
            "🔧 keep shipping"
            "📚 never stop learning"
          )

          for i in $(seq 1 $NUM); do
            python3 /tmp/update.py
            IDX=$((RANDOM % ${#MSGS[@]}))
            MSG="${MSGS[$IDX]}"
            git add stats.json activity.log streak.json README.md
            git commit -m "$MSG — $(date -u '+%H:%M:%S')"
            sleep 2
          done

          git pull --rebase
          git push
